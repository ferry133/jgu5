---
# cluster.yaml.sample — per-cluster configuration
# Copy to cluster.yaml, fill in values, then run: task configure
# cluster.yaml is gitignored and never committed.

# ── Network ───────────────────────────────────────────────────────────────────
# -- The network CIDR for the nodes.
# (REQUIRED) / (e.g. 192.168.1.0/24)
node_cidr: "10.9.9.0/24"            # subnet for node IPs

# -- The default gateway for the nodes.
#    (OPTIONAL) / (DEFAULT: the first IP in the node_cidr)
# node_default_gateway: "10.x.x.1"    # router IP

# -- DNS servers to use for the cluster.
#    (OPTIONAL) / (DEFAULT: ["1.1.1.1", "1.0.0.1"]) / (Cloudflare DNS)
# node_dns_servers: []

# -- NTP servers to use for the cluster.
#    (OPTIONAL) / (DEFAULT: ["162.159.200.1", "162.159.200.123"]) / (Cloudflare NTP)
# node_ntp_servers: []

# -- Attach a vlan tag to the Talos nodes. Not needed if ports on your switch are tagged or you are not using VLANs.
#    (OPTIONAL) / (REF: https://www.talos.dev/latest/advanced/advanced-networking/#vlans)
# node_vlan_tag: ""

# -- Additional SANs to add to the Kube API cert. This is useful if you want to call the Kube API by hostname rather than IP
#    (OPTIONAL) / (e.g. ["mycluster.example.com"])
# cluster_api_tls_sans: []

# -- The pod CIDR for the cluster, this must NOT overlap with any existing networks and should be a /16 (64K IPs).
#    (OPTIONAL) / (DEFAULT: "10.42.0.0/16")
# cluster_pod_cidr: ""

# -- The service CIDR for the cluster, this must NOT overlap with any existing networks and should be a /16 (64K IPs).
#    (OPTIONAL) / (DEFAULT: "10.43.0.0/16")
# cluster_svc_cidr: ""
cluster_svc_cidr: "10.96.0.0/16"      # Don't change!! align with omni default setting.

# -- The IP address of the Kube API.
#    (REQUIRED) / (NOTE: Choose an unused IP in node_cidr)
#cluster_api_addr: "10.x.x.x"               # VIP or first controller IP
cluster_api_addr: 10.9.9.2

# -- The Load balancer IP for k8s_gateway, this provides DNS to all your gateways when split DNS is configured on your internal DNS server (Dnsmasq, Pi-hole, etc)
#    (REQUIRED) / (NOTE: Choose an unused IP in node_cidr)
#cluster_dns_gateway_addr: "10.x.x.x"       # k8s-gateway (DNS) LB IP
cluster_dns_gateway_addr: 10.9.9.3

# -- The Load balancer IP for the internal gateway
#    (REQUIRED) / (NOTE: Choose an unused IP in node_cidr)
#cluster_gateway_addr: "10.x.x.x"           # envoy-internal LB IP
cluster_gateway_addr: 10.9.9.4

# -- The Load balancer IP for the external gateway
#    (REQUIRED) / (NOTE: Choose an unused IP in node_cidr)
#cloudflare_gateway_addr: "10.x.x.x"        # envoy-external LB IP
cloudflare_gateway_addr: 10.9.9.5


# ── Cloudflare ────────────────────────────────────────────────────────────────
# -- Domain you wish to use from your Cloudflare account
#    (REQUIRED) / (e.g. "example.com")
cloudflare_domain: "example.com"

# -- API Token for Cloudflare with the 'Zone:DNS:Edit' and 'Account:Cloudflare Tunnel:Read' permissions
#    (REQUIRED) (NOTE: See the README for information on creating this)
cloudflare_token: ""                 # API token (DNS edit permission)

# -- Cloudflare Tunnel token for cloudflared.
#    Run: cloudflared tunnel create <name> && cloudflared tunnel token <name>
#    (REQUIRED)
cloudflare_tunnel_token: ""


# ── github webhook ────────────────────────────────────────────────────────────────
# -- Random token for GitHub webhook receiver (Flux Receiver).
#    Run: python3 -c "import secrets; print(secrets.token_hex(32))"
#    Run: kubectl -n flux-system get receiver github-webhook --output=jsonpath='{.status.webhookPath}'
#    (REQUIRED)
github_webhook_token: ""


# ── cilium ────────────────────────────────────────────────────────────────
# -- The load balancer mode for cilium.
#    (OPTIONAL) / (DEFAULT: "dsr") / (NOTE: accepted values are 'dsr' or 'snat') / (REF: https://docs.cilium.io/en/stable/network/kubernetes/kubeproxy-free/)
# cilium_loadbalancer_mode: ""

# -- The IP address of the BGP router, to keep things simple, node network will be used for BGP peering.
# (OPTIONAL) / (e.g. "192.168.1.1") / (REF: https://docs.cilium.io/en/latest/network/bgp-control-plane/bgp-control-plane/)
# cilium_bgp_router_addr: ""

# -- The BGP router ASN
# (OPTIONAL) / (e.g. "64513")
# cilium_bgp_router_asn: ""

# -- The BGP node ASN
# (OPTIONAL) / (e.g. "64514")
# cilium_bgp_node_asn: ""

# ── NAS (optional, required for storage/nfs-subdir and claudecode/claude-code) ──
# nas_server: "10.x.x.x"
# nas_path: "/volume/path"          # NFS export for storage provisioner (sc-nas)
# nas_coding_path: "/volume/coding" # NFS export for claude-code coding workspace


# ── Repository ────────────────────────────────────────────────────────────────
# -- Your per-user GitHub repo name (owner/repo).
#    The FluxInstance will sync from this repo (kubernetes/flux/cluster).
#    This value is also used to generate FLUX_SYNC_URL in cluster-secrets.
#    (REQUIRED) / (e.g. "ferry133/jgu2")
repository_name: "ferry133/xxxxxx"

# -- Short cluster identifier used as NFS directory prefix: <cluster_name>-<namespace>-<pvc>
#    (REQUIRED) / (e.g. "jgu5")
cluster_name: "xxxxxx"
# repository_branch: "main"
# repository_visibility: "public"

# ── Extras (optional) ────────────────────────────────────────────────────────
# List the extras to deploy. Format: namespace/app
# Available extras:
#   claudecode/claude-code       — Claude Code web IDE (requires nas_* + claude_instances)
#   default/echo                  — simple echo server (for testing)
#   default/homebridge            — Homebridge smart home bridge
#   default/mariadb               — MariaDB database
#   default/mqtt                  — MQTT broker
#   default/postgres              — shared PostgreSQL (agent memory + linebot)
#   default/synophoto             — Synology Photo Tagger web UI (GPS tag + backup)
#   default/trello-notifier       — Trello LINE notification bot
# postgres_password: ""           # required when extras includes default/postgres
#   default/ttyd                  — web terminal
#   ingress-nginx/ingress-nginx   — Nginx ingress controller
#   network/cloudflare-tunnel-lan — Cloudflare Tunnel (LAN exposure)
#   omni/omni                     — Sidero Omni (requires omni_gpg_key + storage/local-path-provisioner)
#   storage/local-path-provisioner — local-path storage class (needed by omni/omni)
#   freepbx/freepbx               — FreePBX / Asterisk PBX (requires freepbx_mysql_*)
# extras:
#   - claudecode/claude-code
#   - default/trello-notifier

# ── Claude Code (optional, required when extras includes claudecode/claude-code) ──
# claude_instances:
#   - "cc"
#   - "trello"
# ttyd_credential: "user:password"  # ttyd basic auth

# ── Synology Photo Tagger (optional, required when extras includes default/synophoto) ──
# Auth0: create a Regular Web App at manage.auth0.com
#   Allowed Callback URLs: https://synophoto.<your-domain>/callback
#   Allowed Logout URLs: https://synophoto.<your-domain>
# synophoto_auth0_domain: ""        # e.g. "your-tenant.us.auth0.com"
# synophoto_auth0_client_id: ""
# synophoto_auth0_client_secret: ""
# synophoto_allowed_emails: ""      # comma-separated, e.g. "alice@example.com,bob@example.com"
# synophoto_flask_secret_key: ""    # generate with: python3 -c "import secrets; print(secrets.token_hex(32))"

# ── FreePBX (optional, required when extras includes freepbx/freepbx) ─────────
# freepbx_mysql_root_password: ""
# freepbx_mysql_password: ""

# ── Omni (optional, required when extras includes omni/omni) ─────────────────
# GPG private key for omni etcd encryption. Generate with:
#   (export GNUPGHOME=$(mktemp -d); gpg --batch --passphrase '' --quick-gen-key x; \
#    gpg -a --export-secret-key; rm -rf $GNUPGHOME)
# Paste the full multiline PGP key including BEGIN/END lines.
# omni_gpg_key: |
#   -----BEGIN PGP PRIVATE KEY BLOCK-----
#   ...
#   -----END PGP PRIVATE KEY BLOCK-----
