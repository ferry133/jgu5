---
# per-user-repo.sample.yaml
#
# Reference snapshot of the Flux entry point for a per-user private repo.
# The real file is generated by `task configure` at:
#   kubernetes/flux/cluster/ks.yaml
#
# Per-user repo structure:
#   cluster-secrets.sops.yaml          ← encrypted by task configure
#   kubernetes/flux/cluster/ks.yaml    ← generated by task configure from cluster.yaml
#
# To add/remove extras, edit cluster.yaml and re-run `task configure`.
# The GitRepository "jg-base" must already exist in flux-system namespace.
# It is bootstrapped by: task bootstrap:apps

# ── GitRepository — points to jg-base ────────────────────────────────────────
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: jg-base
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/ferry133/jg-base
  ref:
    branch: main
---
# ── Base Kustomization — installed on every cluster ───────────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-base
  namespace: flux-system
spec:
  decryption:
    provider: sops
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: jg-base
    namespace: flux-system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  wait: false
  patches:
    - patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          decryption:
            provider: sops
          deletionPolicy: WaitForTermination
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    strategy:
                      name: RetryOnFailure
                  rollback:
                    cleanupOnFail: true
                    recreate: true
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                    strategy:
                      name: RemediateOnFailure
                    remediation:
                      remediateLastFailure: true
                      retries: 2
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
---
